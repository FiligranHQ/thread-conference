name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions tab
  workflow_dispatch:
  # Re-deploy when content is published in Sanity Studio.
  # Configure a Sanity webhook that sends a POST to:
  #   https://api.github.com/repos/FiligranHQ/thread-conference/dispatches
  # with the payload: { "event_type": "sanity-publish" }
  repository_dispatch:
    types: [sanity-publish]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # When SANITY_PROJECT_ID is set, the build script automatically runs
        # scripts/fetch-content.ts first to pull content from Sanity CMS.
        # Without the secret the site builds using the hardcoded src/content/*.ts files.
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
